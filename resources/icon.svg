<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- GPT bubble (green, back-left) -->
  <g transform="translate(120, 160)">
    <rect x="0" y="0" width="160" height="110" rx="20" ry="20" fill="#6ee7b7" opacity="0.9"/>
    <polygon points="30,110 50,140 60,110" fill="#6ee7b7" opacity="0.9"/>
    <rect x="20" y="28" width="100" height="8" rx="4" fill="#1a3a2a" opacity="0.5"/>
    <rect x="20" y="48" width="120" height="8" rx="4" fill="#1a3a2a" opacity="0.5"/>
    <rect x="20" y="68" width="80" height="8" rx="4" fill="#1a3a2a" opacity="0.5"/>
  </g>

  <!-- Gemini bubble (blue, back-right) -->
  <g transform="translate(230, 140)">
    <rect x="0" y="0" width="170" height="110" rx="20" ry="20" fill="#93c5fd" opacity="0.9"/>
    <polygon points="120,110 130,140 150,110" fill="#93c5fd" opacity="0.9"/>
    <rect x="20" y="28" width="110" height="8" rx="4" fill="#1a2a3a" opacity="0.5"/>
    <rect x="20" y="48" width="130" height="8" rx="4" fill="#1a2a3a" opacity="0.5"/>
    <rect x="20" y="68" width="90" height="8" rx="4" fill="#1a2a3a" opacity="0.5"/>
  </g>

  <!-- Claude bubble (purple, front-center) -->
  <g transform="translate(150, 240)">
    <rect x="0" y="0" width="200" height="120" rx="22" ry="22" fill="#c4b5fd" opacity="0.95"/>
    <polygon points="80,120 100,155 110,120" fill="#c4b5fd" opacity="0.95"/>
    <rect x="24" y="30" width="130" height="9" rx="4.5" fill="#2a1a3a" opacity="0.5"/>
    <rect x="24" y="52" width="152" height="9" rx="4.5" fill="#2a1a3a" opacity="0.5"/>
    <rect x="24" y="74" width="100" height="9" rx="4.5" fill="#2a1a3a" opacity="0.5"/>
  </g>
</svg>
